blur-method = "dual_kawase";
blur-strength = 7;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

shadow = true;
shadow-radius = 18;
shadow-opacity = 0.55;
shadow-offset-x = -14;
shadow-offset-y = -14;

opacity-rule = [
  "85:class_g = 'Alacritty'",
  "100:class_g = 'firefox'",
  "100:class_g = 'falkon'"
];

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

backend = "glx";
vsync = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = true;
